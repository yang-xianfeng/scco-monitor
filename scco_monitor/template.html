<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCCO Monitor · Correlation</title>
<script src="https://cdn.plot.ly/plotly-%(plotly_version)s.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:rgba(48,54,61,.6);--text:#c9d1d9;--sec:#8b949e;--muted:#484f58;--safe:#26a69a;--watch:#ffa726;--hot:#ff7043;--danger:#ef5350;--cu:#ffa726;--scco:#58a6ff;--corr:#26a69a;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5}
.container{max-width:1200px;margin:0 auto;padding:20px 20px}

.header{display:flex;justify-content:space-between;align-items:baseline;padding:0 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.header h1{font-size:17px;font-weight:600;letter-spacing:.2px}
.header h1 span{color:var(--sec);font-weight:400}
.header-meta{font-size:11px;color:var(--muted)}

.stats{display:flex;gap:12px;margin-bottom:16px}
.stat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 14px;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:box-shadow .15s}
.stat:hover{box-shadow:0 3px 10px rgba(0,0,0,.35)}
.stat .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--sec)}
.stat--cu .l{color:var(--cu)}
.stat--scco .l{color:var(--scco)}
.stat--corr .l{color:var(--corr)}
.stat--corr.safe{border-color:rgba(38,166,154,.35)}
.stat--corr.watch{border-color:rgba(255,167,38,.35)}
.stat--corr.hot{border-color:rgba(255,112,67,.35)}
.stat--corr.danger{border-color:rgba(239,83,80,.35)}
.stat .v{font-size:20px;font-weight:700}
.stat .v.safe{color:var(--safe)}
.stat .v.watch{color:var(--watch)}
.stat .v.hot{color:var(--hot)}
.stat .v.danger{color:var(--danger)}
.tag{display:inline-block;padding:2px 10px;border-radius:3px;font-size:11px;font-weight:600}
.tag.safe{background:rgba(38,166,154,.12);color:var(--safe)}
.tag.watch{background:rgba(255,167,38,.12);color:var(--watch)}
.tag.hot{background:rgba(255,112,67,.12);color:var(--hot)}
.tag.danger{background:rgba(239,83,80,.12);color:var(--danger)}

.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.chart-wrap .title{font-size:11px;font-weight:600;color:var(--sec);padding:6px 10px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);margin-bottom:4px}
.chart-wrap .title .badge{font-size:12px;font-weight:600;color:var(--text);font-family:Consolas,monospace;letter-spacing:.2px}

#chart{height:260px}
#history-chart{height:300px}
@media(max-width:640px){
  .container{padding:14px 12px}
  .header h1{font-size:15px}
  .header{margin-bottom:12px}
  .stats{flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .stat{flex:1 1 calc(50%% - 3px);padding:14px 10px}
  .stat:last-child{flex:1 1 100%%}
  .stat .l{font-size:9px}
  .stat .v{font-size:17px}
  .chart-wrap{margin-bottom:12px}
  #chart{height:240px}#history-chart{height:280px}
}
</style>
</head>
<body>
<div class="container">

<header class="header">
  <h1>SCCO <span>· Correlation Monitor</span></h1>
  <div class="header-meta">%(updated)s ET</div>
</header>

<div class="stats">
  <div class="stat stat--cu">
    <span class="l">Cu</span>
    <span class="v">$%(copper).4f</span>
  </div>
  <div class="stat stat--scco">
    <span class="l">SCCO</span>
    <span class="v">$%(scco_close).2f</span>
  </div>
  <div class="stat stat--corr %(sig_key)s">
    <span class="l">Corr</span>
    <span class="v %(sig_key)s">%(ratio).4f</span>
    <span class="tag %(sig_key)s">%(sig_tag)s</span>
  </div>
</div>

<div class="chart-wrap">
  <div class="title">
    <span class="badge">%(trade_date)s</span>
    <span>Intraday · %(intraday_interval)s</span>
  </div>
  <div id="chart"></div>
</div>

<div class="chart-wrap">
  <div class="title">History · %(days_historical)dD</div>
  <div id="history-chart"></div>
</div>

</div>

<script>
(function(){var c=%(chart_json)s;if(!c||!c.data||!c.data[0]||!c.data[0].x||!c.data[0].x.length){
  document.getElementById('chart').innerHTML='<div style="text-align:center;padding:80px 20px;color:var(--muted)"><p>No intraday data</p></div>';return}
  Plotly.react('chart',c.data,c.layout,c.config)})();

(function(){var c=%(history_chart_json)s;if(!c||c==='null'){
  document.getElementById('history-chart').innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><p>Insufficient history</p></div>';return}
  Plotly.react('history-chart',c.data,c.layout,c.config)})();

window.addEventListener('resize',function(){
  ['chart','history-chart'].forEach(function(id){
    var el=document.getElementById(id);if(el&&el.layout)Plotly.Plots.resize(el)})});
</script>
</body>
</html>
