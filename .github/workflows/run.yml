name: SCCO Monitor

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/**'
  # ═══════════════════════════════════════════════════════════════
  #  GitHub Actions cron 运行在 UTC，不支持时区
  #  美股交易: Mon-Fri 9:30-16:00 ET
  #  夏令时 EDT = UTC-4  /  冬令时 EST = UTC-5
  #
  #  时段划分:  开盘密集(5min) → 盘中常规(15min) → 收盘密集(5min)
  #  非交易日的运行由 main.py 自动兜底 (返回 None, 不写 CSV)
  # ═══════════════════════════════════════════════════════════════
  schedule:
    - cron: '30-55/5 13 * * 1-5'  # 13:30-13:55 UTC =  9:30- 9:55 EDT /  8:30- 8:55 EST → 开盘首25min
    - cron: '*/5 14-15 * * 1-5'   # 14:00-15:55 UTC = 10:00-11:55 EDT /  9:00-10:55 EST → 开盘第1-2.5h
    - cron: '*/15 16-18 * * 1-5'  # 16:00-18:55 UTC = 12:00-14:55 EDT / 11:00-13:55 EST → 盘中
    - cron: '*/5 19-20 * * 1-5'   # 19:00-20:55 UTC = 15:00-16:55 EDT / 14:00-15:55 EST → 收盘（最后1h+）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        run: python main.py
        env:
          THRESHOLD_SAFE: ${{ vars.THRESHOLD_SAFE }}
          THRESHOLD_WATCH: ${{ vars.THRESHOLD_WATCH }}
          THRESHOLD_HOT: ${{ vars.THRESHOLD_HOT }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Commit data back to repo
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "auto: update data & chart [skip ci]"
          file_pattern: data/ docs/
