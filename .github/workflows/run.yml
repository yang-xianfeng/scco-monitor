name: SCCO Monitor

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/**'
  # ═══════════════════════════════════════════════════════════════
  #  GitHub Actions cron 运行在 UTC，不支持时区
  #  美股交易: Mon-Fri 9:30-16:00 ET
  #  夏令时 EDT = UTC-4  /  冬令时 EST = UTC-5
  #
  #  单段宽 cron：main.py 的 check_schedule() 按 ET 调度表精确控制
  #  UTC 11-21 覆盖 EDT 7:00-17:55 / EST 6:00-16:55
  #  非交易日的运行由 main.py 自动兜底 (返回 None, 不写 CSV)
  # ═══════════════════════════════════════════════════════════════
  schedule:
    - cron: '*/5 11-21 * * 1-5'   # 调度逻辑全在 Python scheduler.py
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor (retry 3x)
        run: |
          for i in {1..3}; do
            python main.py && exit 0
            echo "重试 $i/3 失败，5秒后重试..."
            sleep 5
          done
          echo "3次均失败"
          exit 1
        env:
          THRESHOLD_SAFE: ${{ vars.THRESHOLD_SAFE }}
          THRESHOLD_WATCH: ${{ vars.THRESHOLD_WATCH }}
          THRESHOLD_HOT: ${{ vars.THRESHOLD_HOT }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        run: |
          echo "📋 Deployment Log"
          echo "════════════════════════════════════════"
          ls -lah docs/
          echo "════════════════════════════════════════"
        if: always()

      - name: Deploy Pages (actions)
        uses: actions/deploy-pages@v5

      - name: Commit data back to repo
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "auto: update data & chart [skip ci]"
          file_pattern: data/ docs/

      - name: Cleanup old runs (keep last 50)
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 50
