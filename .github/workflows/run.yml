name: SCCO Monitor

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/**'
  schedule:
    - cron: '*/5 11-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache virtualenv
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('requirements.txt') }}

      - name: Create virtualenv
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Run monitor
        id: run
        run: |
          for i in $(seq 1 30); do
            rm -f data/.generated
            .venv/bin/python main.py
            if [ -f data/.generated ]; then
              echo "deploy=true" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 2
          done
        env:
          THRESHOLD_SAFE: ${{ vars.THRESHOLD_SAFE }}
          THRESHOLD_WATCH: ${{ vars.THRESHOLD_WATCH }}
          THRESHOLD_HOT: ${{ vars.THRESHOLD_HOT }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit data & HTML
        if: steps.run.outputs.deploy == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "auto: update data & chart [skip ci]"
          file_pattern: data/ docs/

      - name: Cleanup old runs (keep last 50)
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 50
